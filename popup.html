<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; width: 250px; padding: 15px; background-color: #f8f9fa; color: #333; }
    
    .header-controls { display: flex; gap: 10px; margin-bottom: 15px; }
    
    #start-btn, #stop-btn { flex: 2; padding: 10px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
    #start-btn { background-color: #27ae60; color: white; }
    #stop-btn { background-color: #e67e22; color: white; display: none; }
    
    .bypass-btn { flex: 1.2; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; background: #fff; font-size: 11px; }
    .active { background-color: #e74c3c !important; color: white !important; border: none; }

    .eq-container { display: flex; justify-content: space-around; height: 180px; margin: 20px 0; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    .column { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
    
    input[type=range][orient=vertical] {
      appearance: slider-vertical;
      width: 20px;
      height: 100px;
      cursor: pointer;
    }
    
    .label { font-size: 10px; font-weight: bold; margin: 5px 0; color: #555; }
    
    .rst-btn { padding: 2px 8px; font-size: 10px; cursor: pointer; border: 1px solid #ccc; background: #fdfdfd; border-radius: 3px; }
    .rst-btn:hover { background: #eee; }
  </style>
</head>
<body>
  <div class="header-controls">
    <button id="start-btn">START EQ</button>
    <button id="stop-btn">STOP EQ</button>
    <button id="bypass" class="bypass-btn">BYPASS: OFF</button>
  </div>
  
  <div class="eq-container">
    <div class="column">
      <input type="range" id="bass" min="-20" max="20" value="0" orient="vertical">
      <div class="label">BASS</div>
      <button class="rst-btn" data-target="bass">RST</button>
    </div>
    <div class="column">
      <input type="range" id="mid" min="-20" max="20" value="0" orient="vertical">
      <div class="label">MID</div>
      <button class="rst-btn" data-target="mid">RST</button>
    </div>
    <div class="column">
      <input type="range" id="treble" min="-20" max="20" value="0" orient="vertical">
      <div class="label">TREBLE</div>
      <button class="rst-btn" data-target="treble">RST</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
